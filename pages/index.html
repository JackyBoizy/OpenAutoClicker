<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenAutoClicker</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        background: #2c2c2c;
        color: white;
        font-family: "Inter", sans-serif;
        margin: 0;
        padding: 10px;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      .app {
        width: 100%;
        max-width: 520px;
        background: #333;
        border-radius: 16px;
        padding: 28px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 8px;
        text-align: center;
      }

      p {
        text-align: center;
        color: #ccc;
        margin: 0 0 24px;
      }

      .setting {
        margin-bottom: 16px;
        text-align: left;
      }

      .setting label {
        display: block;
        margin-bottom: 8px;
        font-weight: 700;
      }

      input,
      select {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: none;
        outline: none;
        background: #444;
        color: white;
        font-size: 15px;
        box-sizing: border-box;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .buttons {
        display: flex;
        gap: 12px;
        margin-top: 20px;
      }

      button {
        flex: 1;
        padding: 12px 16px;
        border: none;
        border-radius: 8px;
        background: #ff5733;
        color: white;
        cursor: pointer;
        font-size: 15px;
        font-weight: 700;
      }

      button:hover {
        background: #e14a2a;
      }

      .secondary {
        background: #555;
      }

      .secondary:hover {
        background: #666;
      }

      .status {
        margin-top: 18px;
        padding: 12px;
        border-radius: 8px;
        background: #404040;
        color: #ddd;
        font-size: 14px;
        text-align: center;
      }

      .hint {
        margin-top: 10px;
        font-size: 13px;
        color: #aaa;
        text-align: center;
      }

      .toggle-wrap {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .toggle-wrap input {
        width: auto;
        transform: scale(1.2);
      }
    </style>
  </head>
  <body>
    <div class="app">
      <h1>OpenAutoClicker</h1>
      <p>Configure your click settings</p>

      <div class="row">
        <div class="setting">
          <label for="cps">Clicks Per Second</label>
          <input type="number" id="cps" value="5" min="1" max="100" />
        </div>

        <div class="setting">
          <label for="mouseButton">Mouse Button</label>
          <select id="mouseButton">
            <option value="left" selected>Left</option>
            <option value="right">Right</option>
            <option value="middle">Middle</option>
          </select>
        </div>
      </div>

      <div class="setting">
        <label class="toggle-wrap">
          <input type="checkbox" id="toggleMode" />
          Toggle mode (F6 or Start/Stop toggles)
        </label>
      </div>

      <div class="buttons">
        <button id="startBtn">Start</button>
        <button id="stopBtn" class="secondary">Stop</button>
      </div>

      <div id="status" class="status">Ready.</div>
      <div class="hint">Tip: use F6 if you wired it in main.js.</div>
    </div>

    <script>
      const cpsInput = document.getElementById("cps");
      const mouseButtonInput = document.getElementById("mouseButton");
      const toggleModeInput = document.getElementById("toggleMode");
      const startBtn = document.getElementById("startBtn");
      const stopBtn = document.getElementById("stopBtn");
      const statusEl = document.getElementById("status");

      function getSettings() {
        return {
          cps: Number(cpsInput.value) || 5,
          mouseButton: mouseButtonInput.value,
          toggleMode: toggleModeInput.checked,
        };
      }

      function setStatus(text) {
        statusEl.textContent = text;
      }

      startBtn.addEventListener("click", () => {
        const settings = getSettings();

        if (window.electronAPI?.startClicking) {
          window.electronAPI.startClicking(settings);
          setStatus(
            `Running at ${settings.cps} CPS with ${settings.mouseButton} click.`
          );
        } else {
          setStatus("electronAPI.startClicking is missing.");
        }
      });

      stopBtn.addEventListener("click", () => {
        if (window.electronAPI?.stopClicking) {
          window.electronAPI.stopClicking();
          setStatus("Stopped.");
        } else {
          setStatus("electronAPI.stopClicking is missing.");
        }
      });
    </script>
  </body>
</html>
